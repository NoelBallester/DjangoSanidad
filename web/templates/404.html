<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 | DjangoSanidad</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #eff6ff, #f8fafc 55%, #dbeafe);
            color: #0f172a;
            font-family: Arial, sans-serif;
        }

        main {
            width: min(92vw, 620px);
            padding: 2rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
            text-align: center;
        }

        h1 {
            margin: 0 0 0.75rem;
            font-size: 3rem;
            color: #2563eb;
        }

        p {
            margin: 0.5rem 0;
            line-height: 1.6;
        }

        a {
            display: inline-block;
            margin-top: 1.25rem;
            padding: 0.8rem 1.2rem;
            border-radius: 999px;
            background: #2563eb;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <h1>404</h1>
        <p>La pagina solicitada no existe o ya no esta disponible.</p>
        <p>Revisa la direccion o vuelve a una ruta valida de la aplicacion.</p>
        <a href="/index.html">Volver al inicio</a>
    </main>
</body>
</html>
