{% load static %}
{% with c=selected %}
<div class="col-md-12 mt-4">
    <label class="form-label blue__color">Numero de autopsia</label>
    <input type="text" name="necropsia" class="form-control blue__color"
        value="{% if edit %}{{ c.necropsia }}{% endif %}" required>
</div>
<div class="col-md-12 mt-3">
    <label class="form-label blue__color">Tipo de autopsia</label>
    <select name="tipo_necropsia" class="form-select blue__color" required>
        <option value="" disabled {% if not edit %}selected{% endif %}>Seleccionar tipo de autopsia</option>
        <option value="Clínica" {% if edit and c.tipo_necropsia == 'Clínica' %}selected{% endif %}>Clinica</option>
        <option value="Médico-legal" {% if edit and c.tipo_necropsia == 'Médico-legal' %}selected{% endif %}>Medico-legal</option>
    </select>
</div>
<div class="row col-md-12 mt-2">
    <div class="col-md-6">
        <label class="form-label blue__color">Fecha</label>
        <input type="date" name="fecha" class="form-control blue__color"
            value="{% if edit %}{{ c.fecha|date:'Y-m-d' }}{% endif %}" required>
    </div>
    <div class="col-md-6">
        <label class="form-label blue__color">Causa de fallecimiento</label>
        <input type="text" name="descripcion" class="form-control blue__color"
            value="{% if edit %}{{ c.descripcion }}{% endif %}" required>
    </div>
</div>
<input type="hidden" name="organo" value="Otros">
<div class="col-md-12 mt-3">
    <label class="form-label blue__color">Fenomenos cadavericos</label>
    <textarea name="fenomenos_cadavericos" class="form-control blue__color textarea__text">{% if edit %}{{ c.fenomenos_cadavericos }}{% endif %}</textarea>
</div>
<div class="col-md-12 mt-3">
    <label class="form-label blue__color">Examen externo del cadaver</label>
    <textarea name="examen_externo_cadaver" class="form-control blue__color textarea__text">{% if edit %}{{ c.examen_externo_cadaver }}{% endif %}</textarea>
</div>
<div class="col-md-12 mt-3">
    <label class="form-label blue__color">Datos de la muerte</label>
    <textarea name="datos_muerte" class="form-control blue__color textarea__text">{% if edit %}{{ c.datos_muerte }}{% endif %}</textarea>
</div>
<div class="col-md-12 mt-3">
    <label class="form-label blue__color">Descripcion del caso</label>
    <textarea name="caracteristicas" class="form-control blue__color textarea__text"
        required>{% if edit %}{{ c.caracteristicas }}{% endif %}</textarea>
</div>
<div class="col-md-12">
    <label class="form-label blue__color">Observaciones</label>
    <textarea name="observaciones" class="form-control blue__color textarea__text">{% if edit %}{{ c.observaciones }}{% endif %}</textarea>
</div>
<div class="col-md-12 mt-3">
    <label class="form-label blue__color">Volante de peticion (archivo)</label>
    <input type="file" name="volante_peticion" class="form-control blue__color"
        accept=".pdf,.doc,.docx,.jpg,.jpeg,.png">
    {% if edit and c.volante_peticion_nombre %}
        <small class="form-text text-muted">Archivo actual: {{ c.volante_peticion_nombre }}</small>
    {% endif %}
</div>
{% endwith %}
