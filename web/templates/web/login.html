{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <link rel="shortcut icon" href="{% static 'assets/images/favicon.png' %}" type="image/x-icon">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/header.css' %}">
    <link rel="stylesheet" href="{% static 'css/footer.css' %}">
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
    <link rel="stylesheet" href="{% static 'css/loginregistro.css' %}">
    <title>Sanitaria Ribera</title>
</head>
<body>
    <div class="container-fluid margin p-0">
        <nav class="nav navbar navbar-expand-lg shadow-sm sticky-top">
            <div class="container-fluid d-flex align-items-center justify-content-between px-lg-5">
                <a class="navbar-brand nav__logo-container" href="{% url 'login' %}">
                    <div class="logo-box">
                        <i class='bx bxs-flask-iv'></i>
                        <i class="fa-solid fa-microscope" style="font-size:1rem;margin-left:-5px;"></i>
                    </div>
                    <span class="nav__title">Sanidad</span>
                </a>
            </div>
        </nav>

        <main id="form_container" class="main forms">
            <section id="login" class="formcontainer login mt-3">
                <form id="form_login" method="post" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}" autocomplete="nope">
                    {% csrf_token %}
                    <p class="header">Login</p>
                    <div class="field">
                        <input type="number" name="tecnico_id" placeholder="ID Técnico" required class="input"
                            value="{{ request.POST.tecnico_id|default:'' }}">
                    </div>
                    <div class="field">
                        <input id="inputlogin_password" type="password" name="password"
                            placeholder="Contraseña" required class="password" autocomplete="current-password">
                        <i class='bx bx-hide eye-icon' id="togglePassword" style="cursor:pointer"></i>
                    </div>
                    <p class="login__error" {% if not error %}style="display:none"{% endif %}>
                        {% if error %}{{ error }}{% endif %}
                    </p>
                    <div class="field button-field">
                        <button type="submit" id="btn_login">Login</button>
                    </div>
                </form>
            </section>
        </main>

        <footer class="footer mt-5">
            <div class="footer-container">
                <div class="footer__box footer__menu text-center">
                    <h3 class="footer__title">Centros Colaboradores</h3>
                    <section class="links d-flex justify-content-center flex-wrap gap-4">
                        <a href="https://www.iesbohio.es/web/" target="_blank" class="column__link">IES El Bohío</a>
                        <a href="https://www.iesryc.org/" target="_blank" class="column__link">IES Ramón y Cajal</a>
                    </section>
                </div>
            </div>
        </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
    <script>
        document.getElementById('togglePassword').addEventListener('click', function () {
            const inp = document.getElementById('inputlogin_password');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            this.classList.toggle('bx-hide');
            this.classList.toggle('bx-show');
        });
    </script>
</body>
</html>
